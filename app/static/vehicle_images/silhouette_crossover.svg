<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 95" width="220" height="95">
  <!-- Background -->
  <rect width="220" height="95" fill="#16182a" rx="6"/>
  <!-- Ground shadows -->
  <ellipse cx="52" cy="88" rx="21" ry="4" fill="#0d0e18"/>
  <ellipse cx="162" cy="88" rx="21" ry="4" fill="#0d0e18"/>
  <!-- Main body lower: slightly elevated vs sedan, lower than SUV -->
  <rect x="24" y="56" width="170" height="20" fill="#2d3350" rx="3"/>
  <!-- Crossover cabin: medium height ~y=22, gently sloping fastback rear -->
  <polygon points="62,56 72,22 162,22 194,56" fill="#2d3350"/>
  <!-- Rear slope continuing (coupe-SUV fastback) -->
  <polygon points="162,22 194,56 198,58 198,64 190,64 170,24" fill="#252840"/>
  <!-- Hood (medium length, slightly raised) -->
  <polygon points="14,66 24,56 62,56 62,48 32,48" fill="#2d3350"/>
  <polygon points="10,70 14,66 32,48 62,48 62,56 24,56" fill="#2d3350"/>
  <!-- Front bumper -->
  <path d="M10,70 Q8,74 9,78 L24,78 L24,68 Z" fill="#252740"/>
  <!-- Rear bumper -->
  <rect x="196" y="62" width="6" height="12" fill="#252740" rx="1"/>
  <!-- Rear light (angled, following fastback slope) -->
  <rect x="189" y="38" width="4" height="14" fill="#9b2020" rx="1"/>
  <!-- Front headlight -->
  <rect x="10" y="62" width="10" height="5" fill="#8899cc" rx="1" opacity="0.9"/>
  <!-- Front DRL -->
  <rect x="10" y="59" width="14" height="2" fill="#aabbdd" rx="1" opacity="0.6"/>
  <!-- Windows: medium height greenhouse, sloping rear glass -->
  <polygon points="76,55 84,24 160,24 188,55" fill="#3a4a6e" opacity="0.85"/>
  <!-- B-pillar -->
  <line x1="128" y1="24" x2="126" y2="55" stroke="#16182a" stroke-width="3.5"/>
  <!-- Roof rails (subtle) -->
  <rect x="72" y="21" width="92" height="2" fill="#3a3c58" rx="1"/>
  <!-- Door handle front -->
  <rect x="148" y="62" width="12" height="3" fill="#3a3c58" rx="1"/>
  <!-- Door handle rear -->
  <rect x="104" y="62" width="12" height="3" fill="#3a3c58" rx="1"/>
  <!-- Rear wheel arch -->
  <circle cx="52" cy="76" r="17" fill="#16182a"/>
  <!-- Front wheel arch -->
  <circle cx="162" cy="76" r="17" fill="#16182a"/>
  <!-- Rear wheel -->
  <circle cx="52" cy="76" r="14" fill="#1a1c2e"/>
  <circle cx="52" cy="76" r="10" fill="#252842"/>
  <circle cx="52" cy="76" r="6.5" fill="#3d4060"/>
  <circle cx="52" cy="76" r="2.5" fill="#555"/>
  <!-- Front wheel -->
  <circle cx="162" cy="76" r="14" fill="#1a1c2e"/>
  <circle cx="162" cy="76" r="10" fill="#252842"/>
  <circle cx="162" cy="76" r="6.5" fill="#3d4060"/>
  <circle cx="162" cy="76" r="2.5" fill="#555"/>
</svg>
