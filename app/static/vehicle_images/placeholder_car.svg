<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <rect width="200" height="100" fill="#1e2030" rx="10"/>
  <!-- Body -->
  <rect x="20" y="45" width="160" height="35" fill="#2d3147" rx="6"/>
  <!-- Roof -->
  <polygon points="55,45 75,22 125,22 145,45" fill="#3a4060" />
  <!-- Windows -->
  <polygon points="60,43 76,26 110,26 110,43" fill="#6ee7b7" opacity="0.6"/>
  <polygon points="113,43 113,26 124,26 142,43" fill="#6ee7b7" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="58" cy="80" r="14" fill="#1a1a2e"/>
  <circle cx="58" cy="80" r="8" fill="#2d3147"/>
  <circle cx="58" cy="80" r="3" fill="#6ee7b7"/>
  <circle cx="142" cy="80" r="14" fill="#1a1a2e"/>
  <circle cx="142" cy="80" r="8" fill="#2d3147"/>
  <circle cx="142" cy="80" r="3" fill="#6ee7b7"/>
  <!-- Headlight -->
  <rect x="22" y="55" width="12" height="7" fill="#6ee7b7" rx="2" opacity="0.8"/>
  <!-- Taillight -->
  <rect x="166" y="55" width="12" height="7" fill="#f87171" rx="2" opacity="0.8"/>
  <!-- EV bolt -->
  <text x="100" y="68" font-family="sans-serif" font-size="18" fill="#6ee7b7" text-anchor="middle">⚡</text>
