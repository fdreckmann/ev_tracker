<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <rect width="200" height="140" fill="#1a1a1a" rx="6"/>
  <!-- Header area -->
  <rect x="8" y="8" width="184" height="28" fill="#1e3a5f" rx="3"/>
