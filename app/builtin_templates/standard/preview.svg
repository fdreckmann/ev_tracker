  <!-- Data rows -->
  <rect x="8" y="50" width="184" height="8" fill="#1e2e1e"/>
  <rect x="8" y="58" width="184" height="8" fill="#1a1a1a"/>
  <rect x="8" y="66" width="184" height="8" fill="#1e2e1e"/>
  <rect x="8" y="74" width="184" height="8" fill="#1a1a1a"/>
  <rect x="8" y="82" width="184" height="8" fill="#1e2e1e"/>
  <rect x="8" y="90" width="184" height="8" fill="#1a1a1a"/>
  <!-- Grid lines -->
  <line x1="8" y1="50" x2="192" y2="50" stroke="#2a3a2a" stroke-width="0.5"/>
  <line x1="8" y1="58" x2="192" y2="58" stroke="#252525" stroke-width="0.5"/>
  <line x1="8" y1="66" x2="192" y2="66" stroke="#252525" stroke-width="0.5"/>
