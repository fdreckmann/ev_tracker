<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EV Tracker — Neues Passwort</title>
<style>
  :root {
    --bg:#0b0f14;--card:#111820;--brd:#1e2a35;--accent:#00d278;
    --acc2:#00b4ff;--mute:#5a7080;--danger:#ff4f5a;
    --mono:'JetBrains Mono','Fira Mono','Courier New',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:#e0eaf2;font-family:system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:var(--card);border:1px solid var(--brd);border-radius:16px;
    padding:36px 40px;width:100%;max-width:380px}
  .logo{text-align:center;margin-bottom:28px}
  .logo .icon{font-size:2.6rem}
  .logo h1{font-size:1.25rem;font-weight:700;margin-top:8px}
  .logo p{font-size:.75rem;font-family:var(--mono);color:var(--mute);margin-top:4px}
  label{display:block;font-size:.72rem;font-family:var(--mono);color:var(--mute);
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  input{width:100%;background:#0d1520;border:1px solid var(--brd);border-radius:8px;
    color:#e0eaf2;font-size:.88rem;padding:10px 14px;margin-bottom:16px;outline:none;
    transition:border-color .15s}
  input:focus{border-color:var(--acc2)}
  .btn{width:100%;background:var(--accent);color:#041810;font-weight:700;font-size:.9rem;
    border:none;border-radius:8px;padding:12px;cursor:pointer;margin-top:4px;transition:opacity .15s}
  .btn:hover{opacity:.88}
  .error{background:rgba(255,79,90,.1);border:1px solid rgba(255,79,90,.3);border-radius:8px;
    color:var(--danger);font-size:.78rem;font-family:var(--mono);padding:10px 14px;margin-bottom:16px}
  .back-link{display:block;text-align:center;margin-top:18px;font-size:.75rem;
    font-family:var(--mono);color:var(--mute);text-decoration:none}
  .back-link:hover{color:var(--acc2)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">⚡</div>
    <h1>EV Tracker</h1>
    <p>Neues Passwort setzen</p>
  </div>

  {% if invalid %}
  <div class="error">❌ Dieser Link ist ungültig oder abgelaufen.</div>
  <a href="/forgot-password" class="back-link">← Neuen Link anfordern</a>
  {% else %}
  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Neues Passwort</label>
    <input type="password" name="password" autofocus autocomplete="new-password" placeholder="Mindestens 8 Zeichen">
    <label>Passwort wiederholen</label>
    <input type="password" name="password2" autocomplete="new-password" placeholder="••••••••">
    <button type="submit" class="btn">Passwort speichern</button>
  </form>
  <a href="/login" class="back-link">← Zurück zum Login</a>
  {% endif %}
</div>
</body>
</html>
