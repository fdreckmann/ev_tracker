<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EV Tracker — Login</title>
<style>
  :root {
    --bg:     #0b0f14;
    --card:   #111820;
    --brd:    #1e2a35;
    --accent: #00d278;
    --acc2:   #00b4ff;
    --mute:   #5a7080;
    --danger: #ff4f5a;
    --mono:   'JetBrains Mono','Fira Mono','Courier New',monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: #e0eaf2;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 16px;
    padding: 36px 40px;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo .icon { font-size: 2.6rem; }
  .logo h1 { font-size: 1.25rem; font-weight: 700; margin-top: 8px; }
  .logo p { font-size: .75rem; font-family: var(--mono); color: var(--mute); margin-top: 4px; }
  label {
    display: block;
    font-size: .72rem;
    font-family: var(--mono);
    color: var(--mute);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: #0d1520;
    border: 1px solid var(--brd);
    border-radius: 8px;
    color: #e0eaf2;
    font-size: .88rem;
    padding: 10px 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--acc2); }
  .btn {
    width: 100%;
    background: var(--accent);
    color: #041810;
    font-weight: 700;
    font-size: .9rem;
    border: none;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .88; }
  .error {
    background: rgba(255,79,90,.1);
    border: 1px solid rgba(255,79,90,.3);
    border-radius: 8px;
    color: var(--danger);
    font-size: .78rem;
    font-family: var(--mono);
    padding: 10px 14px;
    margin-bottom: 16px;
  }
  .totp-hint {
    font-size: .7rem;
    font-family: var(--mono);
    color: var(--mute);
    margin-top: -10px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">⚡</div>
    <h1>EV Tracker</h1>
    <p>Bitte melde dich an</p>
  </div>

  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <label>Passwort</label>
    <input type="password" name="password" autofocus autocomplete="current-password" placeholder="••••••••">

    {% if totp_enabled %}
    <label>2FA-Code</label>
    <input type="text" name="totp" inputmode="numeric" pattern="[0-9 ]*"
           autocomplete="one-time-code" placeholder="123 456" maxlength="7">
    <p class="totp-hint">Code aus deiner Authenticator-App (Google / Authy)</p>
    {% endif %}

    <button type="submit" class="btn">Anmelden</button>
  </form>
</div>
</body>
</html>
