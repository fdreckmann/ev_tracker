name: Build & Push Docker Image

on:
  push:
    branches:
      - main
      - dev
      - test
    tags:
      - 'v*'

  schedule:
    - cron: '0 2 * * *'   # nightly um 02:00 UTC

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ev-tracker

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pillow

      - name: Python syntax check
        run: python -m compileall -q app tests

      - name: JavaScript syntax check
        run: for f in app/static/js/*.js; do node --check "$f"; done

      - name: Run tests
        run: python -m pytest -q

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tags
        id: tags
        shell: bash
        run: |
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-8)

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:nightly"
              echo "${IMAGE_NAME}:nightly-${SHA_SHORT}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:${VERSION}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:beta"
              echo "${IMAGE_NAME}:main-${SHA_SHORT}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:dev"
              echo "${IMAGE_NAME}:dev-${SHA_SHORT}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

          elif [ "${GITHUB_REF_NAME}" = "test" ]; then
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:beta"
              echo "${IMAGE_NAME}:beta-${SHA_SHORT}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

          else
            echo "Unsupported ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
