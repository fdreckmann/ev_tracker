name: Test, Build & Push Docker Image

on:
  push:
    branches:
      - main
      - dev
      - test
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: 19121412/ev-tracker

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Python syntax check
        run: python -m compileall -q app tests

      - name: JavaScript syntax check
        run: |
          for f in app/static/js/*.js; do
            node --check "$f"
          done

      - name: Run pytest
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          DATA_DIR: ${{ runner.temp }}/ev-tracker-data
          EV_TRACKER_UPDATE_CHECK_ENABLED: "false"
          FLASK_SECRET_KEY: "ci-test-secret-key"
        run: |
          mkdir -p "$DATA_DIR"
          python -m pytest -q

      - name: Ensure tests did not write to /data
        run: |
          if [ -d /data ] && [ "$(ls -A /data 2>/dev/null)" ]; then
            echo "ERROR: Tests wrote files to /data:"
            ls -la /data
            exit 1
          fi

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Docker tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-8)

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tags=${IMAGE_NAME}:latest,${IMAGE_NAME}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "tags=${IMAGE_NAME}:dev,${IMAGE_NAME}:dev-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "test" ]; then
            echo "tags=${IMAGE_NAME}:beta,${IMAGE_NAME}:test-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tags=${IMAGE_NAME}:beta,${IMAGE_NAME}:main-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE_NAME}:${GITHUB_REF_NAME}-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
