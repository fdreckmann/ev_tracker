name: Build & Push Docker Image

on:
  push:
    branches: [ "main", "dev" ]
  schedule:
    - cron: '0 2 * * *'   # nightly um 02:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tags
        id: tags
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-8)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/ev-tracker:nightly" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/ev-tracker:dev" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/ev-tracker:latest,${{ secrets.DOCKERHUB_USERNAME }}/ev-tracker:$SHA_SHORT" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
