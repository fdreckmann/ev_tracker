services:
  ev-tracker:
    image: 19121412/ev-tracker:latest    # direkt von Docker Hub
    container_name: ev-tracker
    restart: unless-stopped
    ports:
      - "8054:8080"
    volumes:
      - /mnt/user/appdata/ev-tracker:/data
    environment:
      DATA_DIR: "/data"
      TZ: "Europe/Berlin"
