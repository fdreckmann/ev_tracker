services:
  ev-tracker:
    image: 19121412/ev-tracker:latest
    container_name: ev-tracker
    restart: unless-stopped
    ports:
      - "8054:8080"
    volumes:
      - /mnt/user/appdata/ev-tracker:/data
    environment:
      DATA_DIR: "/data"
      TZ: "Europe/Berlin"
      # EV_TRACKER_EXPOSURE: "external"  # Uncomment when running behind a reverse proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
